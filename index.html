<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Password generator app</title>
</head>
<body>

  <h1>Password Generator</h1>

  <div class="password">P4$5W0rD!</div>

  <form action="">

    <label for="">Character Length</label><span class="password__length">0</span>
    <input type="range" name="" id="" min="8" max="16">

    <fieldset>
      <legend>Password Options</legend>

      <input type="checkbox" name="" id="upper-case" checked>
      <label for="upper-case">Include Uppercase Letters</label>

      <input type="checkbox" name="" id="lower-case">
      <label for="lower-case">Include Lowercase Letters</label>

      <input type="checkbox" name="" id="numbers">
      <label for="numbers">Include Numbers</label>

      <input type="checkbox" name="" id="symbols">
      <label for="symbols">Include Symbols</label>
    </fieldset>

    <div class="password__strength">Strength</div>

    <button type="submit">Generate</button>
  </form>

<script src="script.js"></script>
</body>
</html>
